      summary: Get events with markets for a sport and date
      description: 'Returns events with full market/odds data for the specified sport
        and date. This is the primary endpoint for building odds screens.


        The response includes `meta.delta_last_id` which serves as the bootstrap cursor
        for the `/api/v2/markets/delta` polling endpoint.

        '
      parameters:
      - $ref: '#/components/parameters/SportIDPath'
      - name: date
        in: path
        required: true
        schema:
          type: string
          format: date
          example: '2026-01-15'
      - $ref: '#/components/parameters/OffsetQuery'
      - $ref: '#/components/parameters/MarketIDsQuery'
      - $ref: '#/components/parameters/ParticipantIDsQuery'
      - $ref: '#/components/parameters/ParticipantTypeQuery'
      - $ref: '#/components/parameters/AffiliateIDsQuery'
      - $ref: '#/components/parameters/MainLineQuery'
