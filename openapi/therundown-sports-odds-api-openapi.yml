  /api/v2/ws/markets:
    get:
      operationId: v2WebSocketMarkets
      tags:
      - V2 WebSocket
      summary: Markets WebSocket — stream real-time market price updates
      description: "Establishes a WebSocket connection for streaming V2 market price\
        \ changes in real-time.\n\n**Connection**: `wss://therundown.io/api/v2/ws/markets?key=YOUR_API_KEY`\n\
        \n**Filter parameters** (query string):\n- `affiliate_ids` — comma-separated\
        \ affiliate IDs\n- `sport_ids` — comma-separated sport IDs\n- `event_ids`\
        \ — comma-separated event IDs\n- `market_ids` — comma-separated market IDs\n\
        \nAll filters are optional. If none are specified, all messages are received.\n\
        \n**Heartbeat**: Server sends `{\"meta\":{\"type\":\"heartbeat\"},\"data\"\
        :{\"now\":\"<RFC3339>\"}}` every 15 seconds.\n\n**Message format**:\n```json\n\
        {\n  \"meta\": {...},\n  \"data\": {\n    \"affiliate_id\": 19,\n    \"sport_id\"\
        : 4,\n    \"event_id\": \"abc123\",\n    \"market_id\": 1,\n    ...\n  }\n\
        }\n```\n\n**Queue**: 256-message buffer per client. If the client falls behind,\
        \ messages are dropped.\n"
      parameters:
      - $ref: '#/components/parameters/AffiliateIDsQuery'
      - name: sport_ids
        in: query
        schema:
          type: string
        description: Comma-separated sport IDs to filter
      - name: event_ids
        in: query
        schema:
          type: string
        description: Comma-separated event IDs to filter
      - name: market_ids
        in: query
        schema:
          type: string
        description: Comma-separated market IDs to filter
      responses:
        '101':
          description: WebSocket upgrade successful
