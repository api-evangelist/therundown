  /api/v2/markets/delta:
    get:
      operationId: v2GetMarketsDelta
      tags:
      - V2 Markets
      summary: Get market price changes since a given ID
      description: 'Returns market line price changes (new, updated, closed) since
        the specified `last_id`. Use for efficient polling.


        **Bootstrap flow:** To obtain an initial `last_id` cursor, call `GET /api/v2/sports/{sportID}/events/{date}`
        — the response `meta.delta_last_id` provides the current cursor. Then pass
        that value as `last_id` to begin polling this endpoint.


        **Staleness guard:** Cursors older than 30 minutes are rejected with HTTP
        400. If your cursor becomes stale, re-bootstrap from the events endpoint.

        '
      parameters:
      - name: last_id
        in: query
        required: true
        schema:
          type: integer
          format: int64
        description: Return changes with ID greater than this value. Obtain the initial
          cursor from the `meta.delta_last_id` field in the v2 events response. Cursors
          older than 30 minutes are rejected.
      - name: sport_id
        in: query
        schema:
          type: integer
        description: Filter by sport ID
      - $ref: '#/components/parameters/AffiliateIDsQuery'
      - name: market_ids
        in: query
        schema:
          type: string
        description: Comma-separated market IDs to filter
      - name: event_id
        in: query
        schema:
          type: string
        description: Filter by event ID
      - name: limit
        in: query
        schema:
          type: integer
          default: 1000
          maximum: 5000
      responses:
        '200':
          description: Market deltas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketDeltaResponse'
              example:
                meta:
                  delta_last_id: '193500000'
                  count: 2
                  has_more: false
                deltas:
                - id: 193499998
                  event_id: 09bfa53f8484a63e584398545c035932
                  sport_id: 4
                  affiliate_id: 19
                  market_id: 1
                  market_name: moneyline
                  participant_id: 11
                  participant_type: TYPE_TEAM
                  participant_name: Atlanta Hawks
                  line: ''
                  price: '-112'
                  previous_price: '-110'
                  change_type: price_change
                  updated_at: '2026-02-12T00:10:43Z'
                - id: 193499999
                  event_id: 09bfa53f8484a63e584398545c035932
                  sport_id: 4
                  affiliate_id: 19
                  market_id: 3
                  market_name: totals
                  participant_id: 1001
                  participant_type: TYPE_RESULT
                  participant_name: Over
                  line: '235.5'
                  price: '-110'
                  previous_price: '-108'
                  change_type: price_change
                  updated_at: '2026-02-12T00:10:43Z'
        '400':
          description: Invalid or stale cursor
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              examples:
                stale_cursor:
                  summary: Cursor older than 30 minutes
                  value:
                    error: last_id is stale (>30 min), re-bootstrap from events endpoint
                not_found:
                  summary: Cursor ID not found
                  value:
                    error: last_id not found, re-bootstrap from events endpoint
