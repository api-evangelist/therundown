  /api/v2/delta:
    get:
      operationId: v2GetDelta
      tags:
      - V2 Events
      summary: Get event changes since a delta ID
      description: 'Returns raw JSON delta payloads for events that changed since
        `last_id`. Each delta entry is a raw JSON string containing the full event
        update — the `data` field is a serialized JSON string, not a parsed object.


        The response is wrapped in a `meta` object containing the `delta_last_id`
        cursor for subsequent polling.

        '
      parameters:
      - name: last_id
        in: query
        required: true
        schema:
          type: string
          minLength: 36
          maxLength: 36
        description: Delta cursor (36-character UUID). Use `00000000-0000-0000-0000-000000000000`
          for initial fetch, then pass the `delta_last_id` from the previous response.
      - name: sport_id
        in: query
        schema:
          type: integer
        description: Filter by sport ID
      - $ref: '#/components/parameters/AffiliateIDsQuery'
      responses:
        '200':
          description: Delta updates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeltasResponse'
              example:
                meta:
                  delta_last_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                deltas:
                - data: '{"event_id":"09bfa53f8484a63e584398545c035932","sport_id":4,"event_date":"2026-02-12T00:00:00Z","lines":{...}}'
                - data: '{"event_id":"b9c4e2a1f3d5670089ab12cd34ef5678","sport_id":4,"event_date":"2026-02-12T00:00:00Z","lines":{...}}'
