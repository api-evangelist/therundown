        players:
          type: array
          items:
            $ref: '#/components/schemas/PlayerNormalized'
    StatDefinition:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        name:
          type: string
        category:
          type: string
        display_name:
          type: string
        abbreviation:
          type: string
        description:
          type: string
        sport_id:
          type: integer
    TeamStats:
      type: object
      properties:
        team_id:
          type: integer
          nullable: true
        stat_id:
          type: integer
          nullable: true
        stat:
          $ref: '#/components/schemas/StatDefinition'
        season_year:
          type: integer
        season_type:
          type: integer
        season_type_name:
          type: string
        value:
          type: number
        display_value:
          type: string
        per_game_value:
          type: number
        per_game_display_value:
          type: string
        rank:
          type: integer
        rank_display_value:
          type: string
        updated_at:
          type: string
          format: date-time
          nullable: true
    PlayerStats:
      type: object
      properties:
