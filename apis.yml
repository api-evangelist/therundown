aid: therundown
name: The Rundown
description: >
  The Rundown is a sports betting data API platform providing real-time odds,
  lines, scores, and results across 30+ sports leagues including NFL, NBA, MLB,
  NHL, WNBA, MLS, college football and basketball, and international soccer,
  tennis, cricket, and Formula 1. The API aggregates data from 16+ sportsbooks
  including DraftKings, FanDuel, BetMGM, and Pinnacle, as well as prediction
  markets like Kalshi and Polymarket, normalizing everything into a single
  unified schema with 600+ market types covering moneylines, spreads, totals,
  player props, team totals, futures, and live in-play odds. Developers can
  access data via REST endpoints or WebSocket streaming for sub-second
  real-time updates, with historical odds data and line movement tracking
  available on higher tiers.
